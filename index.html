<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Interview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    h1 { font-size: 22px; font-weight: 600; color: #111827; margin-bottom: 8px; }

    p.sub {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* ── lobby ── */
    #lobby button {
      width: 100%;
      background: #111827;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    #lobby button:hover { opacity: .85; }

    /* ── active ── */
    #active { display: none; flex-direction: column; align-items: center; gap: 28px; }

    .avatar-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 4px solid #e5e7eb;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      transition: border-color .3s, box-shadow .3s, background .3s;
    }
    .avatar.speaking {
      border-color: #22c55e;
      background: #f0fdf4;
      box-shadow: 0 0 0 6px #bbf7d0;
    }

    .agent-label { font-size: 13px; color: #6b7280; font-weight: 500; }

    .mic-label { font-size: 12px; color: #9ca3af; }

    .controls { display: flex; align-items: center; gap: 14px; }

    .mic-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid #e5e7eb;
      background: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .mic-btn.muted { background: #fee2e2; border-color: #fca5a5; }

    .end-btn {
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    .end-btn:hover { opacity: .85; }
    .end-btn:disabled { opacity: .5; cursor: not-allowed; }

    .error {
      font-size: 13px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Mock Interview with Alex</h1>
  <p class="sub">
    You'll be interviewed by Alex, an AI Staff Engineer. Make sure your
    microphone is working, then click Start Interview.
  </p>

  <div class="error" id="error"></div>

  <!-- Lobby -->
  <div id="lobby">
    <button id="startBtn" onclick="startInterview()">Start Interview</button>
  </div>

  <!-- Active call -->
  <div id="active">
    <div class="avatar-wrap">
      <div class="avatar" id="avatar">🎙</div>
      <p class="agent-label" id="agentLabel">Alex is listening</p>
    </div>
    <p class="mic-label" id="micLabel">🎤 Microphone active</p>
    <div class="controls">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Toggle mic">🎤</button>
      <button class="end-btn" id="endBtn" onclick="endInterview()">📵 End Interview</button>
    </div>
  </div>
</div>

<script>
  const API = "http://localhost:3001";
  let micStream = null;
  let muted = false;

  function showError(msg) {
    const el = document.getElementById("error");
    el.textContent = msg;
    el.style.display = "block";
  }

  function clearError() {
    document.getElementById("error").style.display = "none";
  }

  async function startInterview() {
    clearError();
    const btn = document.getElementById("startBtn");
    btn.textContent = "Connecting...";
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/start`, { method: "POST" });
      if (!res.ok) throw new Error("Failed to start interview");

      document.getElementById("lobby").style.display = "none";
      document.getElementById("active").style.display = "flex";
    } catch (err) {
      btn.textContent = "Start Interview";
      btn.disabled = false;
      showError(err.message || "Something went wrong. Is the server running?");
    }
  }

  function toggleMic() {
    if (!micStream) return;
    muted = !muted;
    micStream.getAudioTracks().forEach(t => t.enabled = !muted);

    const btn = document.getElementById("micBtn");
    const label = document.getElementById("micLabel");
    btn.textContent = muted ? "🔇" : "🎤";
    btn.classList.toggle("muted", muted);
    label.textContent = muted ? "🔇 Microphone muted" : "🎤 Microphone active";
  }

  async function endInterview() {
    const btn = document.getElementById("endBtn");
    btn.textContent = "Ending...";
    btn.disabled = true;

    if (micStream) {
      micStream.getTracks().forEach(t => t.stop());
      micStream = null;
    }

    try {
      await fetch(`${API}/stop`, { method: "POST" });
    } catch {}

    document.getElementById("active").style.display = "none";
    document.getElementById("lobby").style.display = "block";
    document.getElementById("startBtn").textContent = "Start Interview";
    document.getElementById("startBtn").disabled = false;
    btn.textContent = "📵 End Interview";
    btn.disabled = false;
  }

  // Poll for agent status to show speaking indicator (visual only)
  let speakingTimer = null;
  function simulateSpeaking() {
    // Since audio plays through the system speakers via pyaudio,
    // we can't detect speaking from the browser — show a pulse instead
    const avatar = document.getElementById("avatar");
    const label = document.getElementById("agentLabel");
    let on = false;
    speakingTimer = setInterval(() => {
      on = !on;
      avatar.classList.toggle("speaking", on);
      label.textContent = on ? "Alex is speaking..." : "Alex is listening";
    }, 2500);
  }

  document.getElementById("active").addEventListener("transitionend", () => {
    if (document.getElementById("active").style.display === "flex") {
      simulateSpeaking();
    }
  });
</script>
</body>
</html>
